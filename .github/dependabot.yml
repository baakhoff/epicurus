version: 2
updates:
  # Keep GitHub Actions SHA-pinned and up to date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [area:tooling, type:chore]

  # Keep Python (uv) dependencies up to date.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [area:tooling, type:chore]
    # Group all minor/patch bumps into one PR to reduce noise.
    groups:
      python-dependencies:
        patterns: ["*"]
        update-types: [minor, patch]

  # Keep npm dependencies in the web frontend up to date.
  - package-ecosystem: npm
    directory: /services/web
    schedule:
      interval: weekly
      day: monday
    labels: [area:web, type:chore]
    groups:
      npm-dependencies:
        patterns: ["*"]
        update-types: [minor, patch]
