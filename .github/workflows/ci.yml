name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read # gitleaks-action lists PR commits to scan the diff

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-packages --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        # The package list lives in [tool.mypy] in pyproject.toml.
        run: uv run mypy

      - name: Tests
        run: uv run pytest
        env:
          # Integration tests manage their own container lifecycle; the reaper
          # is unnecessary on ephemeral CI runners and avoids flakiness.
          TESTCONTAINERS_RYUK_DISABLED: "true"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build (includes tsc type-check)
        run: npm run build

      - name: Tests
        run: npm test

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate the assembled compose stack
        run: docker compose -f compose.yaml config -q

  # Validates Prometheus and Alertmanager configs without booting the
  # observability stack. The runtime-smoke gate skips that stack, so a bad rule
  # (e.g. an undefined template function) would otherwise reach production
  # before being caught. See issue #153 and the regression in #152.
  observability-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check Prometheus config and rules
        run: |
          # prom/prometheus' entrypoint is `prometheus`; override it to run promtool.
          # Mount at /etc/prometheus so the config's absolute rule_files glob
          # (/etc/prometheus/rules/*.yml) resolves during `check config`.
          docker run --rm --entrypoint=promtool \
            -v "${{ github.workspace }}/infra/observability/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v3.1.0 \
            check config /etc/prometheus/prometheus.yml
          docker run --rm --entrypoint=promtool \
            -v "${{ github.workspace }}/infra/observability/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v3.1.0 \
            check rules /etc/prometheus/rules/epicurus-alerts.yml

      - name: Check Alertmanager config
        run: |
          docker run --rm --entrypoint=amtool \
            -v "${{ github.workspace }}/infra/observability/alertmanager:/alertmanager:ro" \
            prom/alertmanager:v0.27.0 \
            check-config /alertmanager/alertmanager.yml

  # No shell script was ever parsed by a POSIX shell before this gate: #675 shipped a bash
  # array in a script whose every documented invocation is `sh` (dash on the deploy box), and
  # every existing check — including local testing — used Git Bash's `sh`, which *is* bash, so
  # the parse error was invisible everywhere but the actual deploy box (#691). shellcheck ships
  # preinstalled on the `ubuntu-latest` runner image; the shell it lints each script against is
  # inferred from that script's own shebang (never hardcoded), so a new *.sh is covered the
  # moment it's added — discovered via `git ls-files`, not a hardcoded list.
  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Shellcheck every script, shell inferred from its shebang
        run: |
          set -euo pipefail
          status=0
          while IFS= read -r -d '' f; do
            interpreter="$(head -1 "$f" | awk '{
              sub(/^#! */, "")
              n = split($0, parts, " ")
              split(parts[n], segs, "/")
              print segs[length(segs)]
            }')"
            case "$interpreter" in
              sh | bash | dash | ksh | busybox) ;;
              *)
                echo "::error file=$f::unrecognized shebang interpreter '$interpreter' — add it to this job's shell mapping"
                status=1
                continue
                ;;
            esac
            echo "::group::shellcheck --shell=$interpreter $f"
            shellcheck --shell="$interpreter" "$f" || status=1
            echo "::endgroup::"
          done < <(git ls-files -z '*.sh')
          exit "$status"

  # #661 existed because a docs page path was referenced from shipped operator-facing UI copy
  # and a compose comment while the page it named didn't exist in the public tree — nothing
  # caught it, and a generic markdown-link checker wouldn't catch the next one either; it
  # never looks inside a .tsx or a compose comment (#692). scripts/check_docs_links.py checks
  # (1) every relative link between docs pages, anchors included, and (2) repo-relative doc
  # paths quoted in shipped source (web UI copy, compose comments, other top-level READMEs,
  # .env.example). Stdlib-only — no uv sync needed.
  docs-linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check docs/ links, anchors, and source references
        run: python3 scripts/check_docs_links.py

  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build service images (validate Dockerfiles)
        run: |
          for df in services/*/Dockerfile; do
            svc="$(basename "$(dirname "$df")")"
            echo "::group::build $svc"
            docker build -f "$df" -t "epicurus-$svc:ci" .
            echo "::endgroup::"
          done

  # Boots the actual stack (data plane + OpenBao bootstrap + core + modules) and
  # asserts the integration last mile that the jobs above never exercise: module
  # discovery, status reachability through core, an MCP tool round-trip, and a
  # secret surviving a vault restart. See infra/ci/smoke.sh and #98.
  runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Boot the stack and smoke-test the integration last mile
        run: sh infra/ci/smoke.sh
