name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read # gitleaks-action lists PR commits to scan the diff

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-packages --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy -p epicurus_core -p epicurus_echo

      - name: Tests
        run: uv run pytest
        env:
          # Integration tests manage their own container lifecycle; the reaper
          # is unnecessary on ephemeral CI runners and avoids flakiness.
          TESTCONTAINERS_RYUK_DISABLED: "true"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate the assembled compose stack
        run: docker compose -f compose.yaml config -q

  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build service images (validate Dockerfiles)
        run: |
          for df in services/*/Dockerfile; do
            svc="$(basename "$(dirname "$df")")"
            echo "::group::build $svc"
            docker build -f "$df" -t "epicurus-$svc:ci" .
            echo "::endgroup::"
          done
