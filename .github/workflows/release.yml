name: Release

# Cut a release by pushing a semver tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# The first release is v0.1.0 — the first version usable on a server with a UI.
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+", "v[0-9]+.[0-9]+.[0-9]+-*"]

permissions:
  contents: write

jobs:
  # Build and push images first so they exist on GHCR before the GH Release
  # is published. A GH Release without corresponding images is misleading.
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push service images to GHCR
        run: |
          version="${GITHUB_REF_NAME#v}"
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          for df in services/*/Dockerfile; do
            svc="$(basename "$(dirname "$df")")"
            img="ghcr.io/${owner}/epicurus-${svc}"
            echo "::group::build + push ${svc}"
            docker build -f "$df" -t "${img}:${version}" -t "${img}:latest" .
            docker push "${img}:${version}"
            docker push "${img}:latest"
            echo "::endgroup::"
          done

  release:
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          case "${{ github.ref_name }}" in
            *-*) PRERELEASE="--prerelease" ;;
          esac
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            $PRERELEASE
