# Local quality gates, mirrored by CI. Install once with:  uv run pre-commit install
# Mypy is intentionally run in CI / `task type` (not here) to avoid duplicating
# the dependency environment inside pre-commit.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Skip Jinja-templated YAML (cookiecutter renders it) and the smoke
        # override, which uses Docker Compose custom tags (!reset) that a plain
        # YAML parser cannot construct.
        exclude: '^(templates/.*|infra/ci/compose\.ci\.yaml)$'
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in lockstep with the exact `ruff==` pin in the root pyproject.toml so the
    # pre-commit hook and CI's `uv run ruff` are the same binary (#514).
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
