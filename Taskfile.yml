# Dev commands. Requires go-task (https://taskfile.dev) — optional; each task is
# a thin wrapper over uv, so you can always run the underlying command directly.
version: "3"

tasks:
  setup:
    desc: Install all dependencies into the uv-managed virtualenv
    cmds:
      - uv sync --all-packages

  new-module:
    desc: Scaffold + wire in a new module (e.g. `task new-module -- "Weather"`); see docs/reference/ports.md
    cmds:
      - uv run python scripts/new_module.py {{.CLI_ARGS}}

  lint:
    desc: Lint with ruff
    cmds:
      - uv run ruff check .

  fmt:
    desc: Auto-format with ruff
    cmds:
      - uv run ruff format .

  fmt-check:
    desc: Check formatting without writing changes
    cmds:
      - uv run ruff format --check .

  type:
    desc: Type-check with mypy (strict; packages come from pyproject.toml)
    cmds:
      - uv run mypy

  test:
    desc: Run the test suite
    cmds:
      - uv run pytest

  check:
    desc: Run every quality gate (lint, format check, types, tests) — mirrors CI
    cmds:
      - task: lint
      - task: fmt-check
      - task: type
      - task: test

  up:
    desc: Start the full stack (data plane + enabled modules; observability and Docker-socket access are opt-in, see `obs-up` / `docker-socket-up`)
    cmds:
      - docker compose up -d

  down:
    desc: Stop the full stack (append `-- -v` to also drop volumes)
    cmds:
      - docker compose down {{.CLI_ARGS}}

  obs-up:
    desc: Start the stack with the opt-in observability profile (Grafana/Prometheus/Loki/Tempo)
    cmds:
      - docker compose --profile observability up -d

  obs-down:
    desc: Stop the stack including the observability profile (append `-- -v` to drop volumes)
    cmds:
      - docker compose --profile observability down {{.CLI_ARGS}}

  docker-socket-up:
    desc: 'Start the stack with the opt-in Docker-socket override (#622): immediate module-removal teardown + KV-cache restart; requires DOCKER_GID (see services/core-app/compose.docker-socket.yaml)'
    cmds:
      - docker compose -f compose.yaml -f services/core-app/compose.docker-socket.yaml up -d

  docker-socket-down:
    desc: Stop the stack including the Docker-socket override (append `-- -v` to drop volumes)
    cmds:
      - docker compose -f compose.yaml -f services/core-app/compose.docker-socket.yaml down {{.CLI_ARGS}}

  smoke:
    desc: Boot an isolated copy of the stack and assert the integration last mile (mirrors the CI gate)
    cmds:
      - sh infra/ci/smoke.sh

  reconcile:
    desc: 'Deploy on the box: pull GHCR images for the tracked tag and restart changed containers (data volumes preserved; EPICURUS_VERSION in .env selects release/pinned/testing; DOCKER_GID in .env persists the docker-socket opt-in, #655)'
    cmds:
      - sh infra/cd/reconcile.sh

  infra-up:
    desc: Start only the data-plane stack (Postgres, Valkey, NATS, Qdrant, OpenBao)
    cmds:
      - docker compose -f infra/compose/docker-compose.yml up -d

  infra-down:
    desc: Stop the data-plane stack (append `-- -v` to also drop volumes)
    cmds:
      - docker compose -f infra/compose/docker-compose.yml down {{.CLI_ARGS}}

  infra-ps:
    desc: Show data-plane service status
    cmds:
      - docker compose -f infra/compose/docker-compose.yml ps

  infra-logs:
    desc: Tail data-plane logs
    cmds:
      - docker compose -f infra/compose/docker-compose.yml logs -f
