# epicurus data plane — the stateful backing services every module builds on.
#
# Local-dev defaults are inline (the `:-` fallbacks); override them in a local
# `infra/compose/.env` (gitignored). Real secrets do NOT live here — in
# staging/prod these are injected from OpenBao. The dev credentials below are
# intentionally weak and for a local, private box.
#
# Published ports bind to BIND_ADDRESS (default 127.0.0.1) — nothing is reachable
# from outside this machine unless the operator opts in (e.g. BIND_ADDRESS=0.0.0.0).
# Containers always reach each other on the internal `epicurus` network.
#
# Bring up:   docker compose -f infra/compose/docker-compose.yml up -d
# (or `task infra-up`). The edge gateway and the observability stack
# (Grafana/Loki/Prometheus/Tempo) assemble on top via the root compose.yaml.

name: epicurus

networks:
  epicurus:
    name: epicurus

volumes:
  postgres-data:
  valkey-data:
  nats-data:
  qdrant-data:
  openbao-data:
  minio-data:
  # The shared file space (#KB-refactor): one tree where every module that owns files
  # writes its own top-level folder — knowledge/ (projects), notes/ — and which the
  # storage module indexes read-only as the unified "Files" view. Default an empty named
  # volume; point EPICURUS_FILES_ROOT at a host directory to expose real files.
  epicurus-files:

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-epicurus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-epicurus-dev}
      POSTGRES_DB: ${POSTGRES_DB:-epicurus}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-epicurus} -d ${POSTGRES_DB:-epicurus}"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [epicurus]

  valkey:
    image: valkey/valkey:8
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "no"]
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [epicurus]

  nats:
    image: nats:2.10
    restart: unless-stopped
    # Authenticated (#50, ADR-0066): all of JetStream / store dir / monitoring and the
    # account+user model live in nats-server.conf now. The nats image has no shell, so
    # readiness is checked from the host via http://localhost:8222/healthz (the monitor
    # port needs no auth). Role passwords come from the env, defaulted weak for dev —
    # override NATS_{CORE,MODULE,SYS}_PASSWORD in .env (or from OpenBao) for real boxes;
    # the SAME values must reach the services (they authenticate against this server).
    command: ["-c", "/etc/nats/nats-server.conf"]
    environment:
      NATS_CORE_PASSWORD: ${NATS_CORE_PASSWORD:-epicurus-dev}
      NATS_MODULE_PASSWORD: ${NATS_MODULE_PASSWORD:-epicurus-dev}
      NATS_SYS_PASSWORD: ${NATS_SYS_PASSWORD:-epicurus-dev}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${NATS_PORT:-4222}:4222"
      - "${BIND_ADDRESS:-127.0.0.1}:${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
      - ./nats-server.conf:/etc/nats/nats-server.conf:ro
    networks: [epicurus]

  # Guards the qdrant data volume across server upgrades (#229). qdrant panics on
  # boot (exit 101) when its on-disk segment format predates the running server —
  # e.g. the v1.12 → v1.18 jump — and a crash-looping qdrant drops out of Docker
  # DNS, breaking every dependent. The vectors are *derived* data (knowledge
  # re-embeds from the vault/docs; memory re-embeds from Postgres), so a reset is
  # safe. This one-shot compares a version marker in the volume to QDRANT_TAG and
  # wipes the store on a mismatch, so an upgrade auto-recovers (a background
  # re-index repopulates) instead of stranding the deploy. See docs/infrastructure/qdrant.md.
  qdrant-init:
    image: alpine:3.21
    restart: "no"
    environment:
      QDRANT_TAG: ${QDRANT_TAG:-v1.18.2}
    volumes:
      - qdrant-data:/qdrant/storage
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        STORAGE=/qdrant/storage
        MARKER="$$STORAGE/.epicurus_qdrant_version"
        mkdir -p "$$STORAGE"
        if [ -f "$$MARKER" ]; then
          CURRENT="$$(cat "$$MARKER" 2>/dev/null || echo '')"
          if [ "$$CURRENT" = "$$QDRANT_TAG" ]; then
            echo "qdrant-init: on-disk version '$$CURRENT' matches '$$QDRANT_TAG'; no action"
          else
            echo "qdrant-init: on-disk version '$$CURRENT' != '$$QDRANT_TAG'; resetting derived vector store"
            find "$$STORAGE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            printf '%s' "$$QDRANT_TAG" > "$$MARKER"
          fi
        else
          echo "qdrant-init: no version marker; stamping '$$QDRANT_TAG' (no reset)"
          printf '%s' "$$QDRANT_TAG" > "$$MARKER"
        fi
    networks: [epicurus]

  qdrant:
    # Server minor must stay within 1 of the qdrant-client (1.18) or the client
    # refuses to connect — keep this in lockstep with the pyproject pin. QDRANT_TAG
    # is the single source of truth (the init marker uses it too); bump both together.
    image: qdrant/qdrant:${QDRANT_TAG:-v1.18.2}
    restart: unless-stopped
    depends_on:
      qdrant-init:
        condition: service_completed_successfully
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${QDRANT_HTTP_PORT:-6333}:6333"
      - "${BIND_ADDRESS:-127.0.0.1}:${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    # The image has no curl/wget, so probe the HTTP listener via /proc: a crash-looping
    # qdrant never binds 6333 (0x18BD) and so reports unhealthy, surfacing the crash (#229).
    healthcheck:
      test: ["CMD-SHELL", "grep -Eq ':18BD [0-9A-F:]+ 0A' /proc/net/tcp /proc/net/tcp6 2>/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks: [epicurus]

  openbao:
    image: openbao/openbao:2.2.0
    restart: unless-stopped
    cap_add: [IPC_LOCK]
    # The image entrypoint drops the server to the `openbao` user (uid 100), which
    # cannot write the root-owned named volume. Start as root, chown the volume to
    # openbao, then hand off to the image entrypoint (which re-drops to openbao).
    user: root
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "chown -R openbao:openbao /openbao/data && exec docker-entrypoint.sh server -config=/openbao/config/config.hcl"
    environment:
      # The `bao` CLI (healthcheck + the bootstrap script's `exec`) talks to the
      # local HTTP listener; without this it defaults to https and fails.
      BAO_ADDR: http://127.0.0.1:8200
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${OPENBAO_PORT:-8200}:8200"
    volumes:
      - openbao-data:/openbao/data
      - ./openbao-config.hcl:/openbao/config/config.hcl:ro
    # Healthy only when active (unsealed). Services that depend on service_healthy
    # wait until openbao-unseal has run. Retries allow up to ~2 min for unsealing.
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks: [epicurus]

  # Watches for a sealed vault and unseals it automatically on every stack start.
  # Reads OPENBAO_UNSEAL_KEY from .env (set by the bootstrap script on first run).
  openbao-unseal:
    image: openbao/openbao:2.2.0
    restart: unless-stopped
    depends_on:
      openbao:
        condition: service_started
    environment:
      BAO_ADDR: http://openbao:8200
      BAO_UNSEAL_KEY: ${OPENBAO_UNSEAL_KEY:-}
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -z "$$BAO_UNSEAL_KEY" ]; then
          echo "OPENBAO_UNSEAL_KEY is not set — run infra/compose/scripts/openbao-bootstrap.sh first"
          exit 1
        fi
        while true; do
          bao status > /dev/null 2>&1; s=$$?
          case $$s in
            0) ;;
            1) echo "OpenBao not reachable, retrying..."; sleep 5; continue ;;
            2) echo "Sealed — unsealing..."; bao operator unseal "$$BAO_UNSEAL_KEY" ;;
            *) echo "Unexpected bao status $$s" ;;
          esac
          sleep 30
        done
    networks: [epicurus]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-epicurus}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-epicurus-dev}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${BIND_ADDRESS:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks: [epicurus]

  # One-shot: prepares the shared file space (#KB-refactor) so the file-owning modules
  # can write it. A fresh named volume is created **root-owned**, but storage/knowledge/
  # notes run as uid 10001 — so without this, knowledge's "create folder"/"new document"
  # (and notes' saves) fail with PermissionError → HTTP 500. This creates each module's
  # subdirectory and chowns **only those** to 10001, leaving the rest of a bind-mounted
  # tree (e.g. an operator's Obsidian vault) untouched. Mirrors qdrant-init/openbao.
  files-init:
    image: alpine:3.21
    restart: "no"
    user: root
    environment:
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-local}
    volumes:
      - ${EPICURUS_FILES_ROOT:-epicurus-files}:/data
    entrypoint:
      - /bin/sh
      - -c
      # The tree is tenant-scoped (constraint #1): /data/<tenant>/{knowledge,notes}. $$ is
      # compose's escape for a literal $, so the shell — not compose — expands the env var.
      - |
        set -eu
        mkdir -p "/data/$$DEFAULT_TENANT_ID"
        chown 10001:10001 "/data/$$DEFAULT_TENANT_ID"
        chmod 755 "/data/$$DEFAULT_TENANT_ID"
        for d in knowledge notes; do
          mkdir -p "/data/$$DEFAULT_TENANT_ID/$$d"
          chown 10001:10001 "/data/$$DEFAULT_TENANT_ID/$$d"
          chmod 755 "/data/$$DEFAULT_TENANT_ID/$$d"
        done
        echo "files-init: ensured /data/$$DEFAULT_TENANT_ID/{knowledge,notes} owned by uid 10001"
    networks: [epicurus]

  # One-shot: waits for MinIO to be healthy then creates the default bucket.
  # Real per-tenant bucket provisioning is the storage module's concern (Phase 2);
  # this seeds the single dev bucket so the storage module has somewhere to write.
  # Dev credentials only — Phase 3 wires OpenBao as the live credential source.
  minio-init:
    # NOTE: the mc client is versioned SEPARATELY from the minio server — its
    # release tags do not match the server's, so they are pinned independently.
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_local: "http://${MINIO_ROOT_USER:-epicurus}:${MINIO_ROOT_PASSWORD:-epicurus-dev}@minio:9000"
    entrypoint: >
      /bin/sh -c "mc mb --ignore-existing local/${MINIO_DEFAULT_BUCKET:-epicurus}"
    networks: [epicurus]
