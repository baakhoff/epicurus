# epicurus data plane — the stateful backing services every module builds on.
#
# Local-dev defaults are inline (the `:-` fallbacks); override them in a local
# `infra/compose/.env` (gitignored). Real secrets do NOT live here — in
# staging/prod these are injected from OpenBao. The dev credentials below are
# intentionally weak and for a local, private box.
#
# Published ports bind to BIND_ADDRESS (default 127.0.0.1) — nothing is reachable
# from outside this machine unless the operator opts in (e.g. BIND_ADDRESS=0.0.0.0).
# Containers always reach each other on the internal `epicurus` network.
#
# Bring up:   docker compose -f infra/compose/docker-compose.yml up -d
# (or `task infra-up`). The edge gateway and the observability stack
# (Grafana/Loki/Prometheus/Tempo) assemble on top via the root compose.yaml.

name: epicurus

networks:
  epicurus:
    name: epicurus

volumes:
  postgres-data:
  valkey-data:
  nats-data:
  qdrant-data:
  minio-data:

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-epicurus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-epicurus-dev}
      POSTGRES_DB: ${POSTGRES_DB:-epicurus}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-epicurus} -d ${POSTGRES_DB:-epicurus}"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [epicurus]

  valkey:
    image: valkey/valkey:8
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "no"]
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [epicurus]

  nats:
    image: nats:2.10
    restart: unless-stopped
    # JetStream on, store dir, HTTP monitoring on :8222. The nats image has no
    # shell, so readiness is checked from the host via http://localhost:8222/healthz.
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${NATS_PORT:-4222}:4222"
      - "${BIND_ADDRESS:-127.0.0.1}:${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    networks: [epicurus]

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${QDRANT_HTTP_PORT:-6333}:6333"
      - "${BIND_ADDRESS:-127.0.0.1}:${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks: [epicurus]

  openbao:
    image: openbao/openbao:2.2.0
    restart: unless-stopped
    cap_add: [IPC_LOCK]
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${OPENBAO_DEV_ROOT_TOKEN:-dev-root-token}
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    # Dev mode is IN-MEMORY: every restart of this container wipes all stored
    # secrets (re-seed afterwards). Fine while nothing critical lives here; a
    # non-dev server config (persistent storage, init + unseal) replaces this
    # when OpenBao becomes the live credential source (Phase 3).
    command: ["server", "-dev"]
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${OPENBAO_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [epicurus]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-epicurus}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-epicurus-dev}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${BIND_ADDRESS:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks: [epicurus]

  # One-shot: waits for MinIO to be healthy then creates the default bucket.
  # Real per-tenant bucket provisioning is the storage module's concern (Phase 2);
  # this seeds the single dev bucket so the storage module has somewhere to write.
  # Dev credentials only — Phase 3 wires OpenBao as the live credential source.
  minio-init:
    # NOTE: the mc client is versioned SEPARATELY from the minio server — its
    # release tags do not match the server's, so they are pinned independently.
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_local: "http://${MINIO_ROOT_USER:-epicurus}:${MINIO_ROOT_PASSWORD:-epicurus-dev}@minio:9000"
    entrypoint: >
      /bin/sh -c "mc mb --ignore-existing local/${MINIO_DEFAULT_BUCKET:-epicurus}"
    networks: [epicurus]
