# epicurus NATS server — authenticated event backbone (#50, ADR-0066).
#
# Closes the "no authentication" hole: the server rejects un-credentialed clients.
# Every service authenticates as a ROLE user — the core as `core` (full bus), every
# module as `module` (tenant-scoped application subjects only) — and operations use
# `sys` in the system account. Passwords come from the environment (NATS_*_PASSWORD):
# weak dev defaults baked into compose, strong values generated by
# infra/compose/scripts/openbao-bootstrap.sh for real deployments. This mirrors the
# rest of the data plane's per-ROLE credential posture (one POSTGRES_PASSWORD, one
# MinIO root, one OpenBao app token) rather than per-service credentials.
#
# Subjects stay tenant-scoped (`<tenant>.<base>`, see epicurus_core.tenancy). Hard
# per-tenant isolation (NATS account == tenant) is the deferred SaaS-track step the
# ADR documents; today the single APP account holds every tenant's subjects and the
# `<tenant>.` prefix is the (cooperative) tenant boundary.

# JetStream + HTTP monitoring — previously passed as `-js -sd /data -m 8222` flags.
# The host readiness probe hits http://localhost:8222/healthz (unauthenticated; the
# monitoring port is independent of client auth).
server_name: epicurus-nats
jetstream {
  store_dir: "/data"
}
http_port: 8222

# Application subjects are always tenant-scoped (`<tenant>.<base>`, ≥ 2 tokens), so a
# `*.>` allow-list covers every legitimate subject while excluding bare/system ones.
# `_INBOX.>` carries request/reply responses (nats-py's default inbox prefix).
MODULE_PERMISSIONS = {
  publish: { allow: ["*.>", "_INBOX.>"] }
  subscribe: { allow: ["*.>", "_INBOX.>"] }
}

accounts {
  # Operations / monitoring. Bound as the system account below, so neither `core`
  # nor `module` (both in APP) can reach the `$SYS.>` server-control subjects.
  SYS {
    users: [
      { user: "sys", password: $NATS_SYS_PASSWORD }
    ]
  }

  # The single application account for v1 (single-tenant). Every app subject lives
  # here; cross-tenant separation today is the `<tenant>.` subject prefix. The SaaS
  # track promotes tenant → account for enforced isolation (ADR-0066).
  APP {
    jetstream: enabled
    users: [
      # The core orchestrates the whole bus — the agent loop, the LLM gateway, and
      # every module request/reply + event — so it gets unrestricted pub/sub.
      {
        user: "core"
        password: $NATS_CORE_PASSWORD
        permissions: { publish: { allow: [">"] }, subscribe: { allow: [">"] } }
      }
      # Modules are sidecars: tenant-scoped application subjects + reply inboxes only.
      # One shared role credential (see the header note on per-role vs per-service).
      {
        user: "module"
        password: $NATS_MODULE_PASSWORD
        permissions: $MODULE_PERMISSIONS
      }
    ]
  }
}

# Reserve $SYS for monitoring/ops; isolates it from the APP account's users.
system_account: SYS
