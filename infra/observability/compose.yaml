# Observability stack — a compose fragment (ADR-0006), assembled into the
# top-level stack via the root compose.yaml `include`.
#
# Prometheus (metrics) scrapes services' /metrics; Alloy ships container logs to
# Loki; the OTel collector receives OTLP traces and forwards them to Tempo;
# Grafana ties them together with pre-provisioned datasources.
services:
  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks: [epicurus]

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks: [epicurus]

  tempo:
    image: grafana/tempo:2.7.0
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./tempo/config.yml:/etc/tempo/config.yml:ro
      - tempo-data:/var/tempo
    ports:
      # OTLP — services send traces straight to Tempo's built-in receiver.
      - "${OTLP_GRPC_PORT:-4317}:4317"
      - "${OTLP_HTTP_PORT:-4318}:4318"
    networks: [epicurus]

  alloy:
    image: grafana/alloy:v1.5.1
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
    networks: [epicurus]

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on: [prometheus, loki, tempo]
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.localhost`)
      - traefik.http.routers.grafana.entrypoints=web
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    networks: [epicurus]

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
