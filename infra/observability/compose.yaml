# Observability stack — a compose fragment (ADR-0006), assembled into the
# top-level stack via the root compose.yaml `include`.
#
# Prometheus (metrics) scrapes services' /metrics; Alloy ships container logs to
# Loki; Tempo receives OTLP traces directly (gRPC/HTTP, no separate collector);
# Grafana ties them together with pre-provisioned datasources.
#
# Published ports bind to BIND_ADDRESS (default 127.0.0.1) — Grafana runs with
# anonymous admin for local dev, so keep it on this machine unless you put your
# own perimeter in front.
services:
  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    # Root so Docker service discovery can read the (read-only) docker socket —
    # the stock image's `nobody` user cannot. Acceptable for a local,
    # loopback-bound stack; swap in a docker-socket proxy if this ever hardens.
    user: root
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
      # Docker service discovery: modules are scraped by container label
      # (epicurus.metrics.port) instead of a hand-maintained target list.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    networks: [epicurus]

  # Blackbox exporter: HTTP/TCP probes for external health checks.
  # Used to probe the OpenBao /v1/sys/health endpoint so Prometheus can
  # alert when the vault is sealed (returns non-200).
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    command: ["--config.file=/etc/blackbox_exporter/config.yml"]
    volumes:
      - ./blackbox/config.yml:/etc/blackbox_exporter/config.yml:ro
    networks: [epicurus]

  # Node exporter: host-level disk, CPU, and memory metrics from the WSL2 VM
  # where Docker Desktop stores its volumes on Windows. Disk-full alerts target
  # this data so the operator knows before writes fail.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    pid: host
    networks: [epicurus]

  # Alertmanager: receives firing alerts from Prometheus and routes them to
  # notification channels. Edit infra/observability/alertmanager/alertmanager.yml
  # to configure a webhook, email, or other receiver.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command: ["--config.file=/etc/alertmanager/alertmanager.yml", "--storage.path=/alertmanager"]
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${ALERTMANAGER_PORT:-9093}:9093"
    networks: [epicurus]

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${LOKI_PORT:-3100}:3100"
    networks: [epicurus]

  tempo:
    image: grafana/tempo:2.7.0
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./tempo/config.yml:/etc/tempo/config.yml:ro
      - tempo-data:/var/tempo
    ports:
      # OTLP — services send traces straight to Tempo's built-in receiver.
      - "${BIND_ADDRESS:-127.0.0.1}:${OTLP_GRPC_PORT:-4317}:4317"
      - "${BIND_ADDRESS:-127.0.0.1}:${OTLP_HTTP_PORT:-4318}:4318"
    networks: [epicurus]

  alloy:
    image: grafana/alloy:v1.5.1
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
    networks: [epicurus]

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # Enable alerting (off by default in embedded mode).
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    depends_on: [prometheus, loki, tempo, alertmanager]
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.localhost`)
      - traefik.http.routers.grafana.entrypoints=web
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    networks: [epicurus]

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
  alertmanager-data:
