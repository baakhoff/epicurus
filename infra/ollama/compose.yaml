# Ollama — the local LLM runtime the core's LLM gateway drives (ADR-0010 / ADR-0011).
#
# Runs as a container so the platform works on any hardware and OS. CPU by default
# (runs everywhere); GPU is opt-in via infra/ollama/gpu.yaml. Models are NOT baked
# into the image — the core pulls and manages them at runtime through Ollama's API.
#
# Internal-only: the core reaches it at http://ollama:11434 on the epicurus network;
# it is not published to the host (private-by-default — the core is the front door).

# Bounded json-file logging (#462) — see infra/compose/docker-compose.yml for the rationale.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # One-shot: makes the shared ollama-runtime volume writable by the core before anything
  # mounts it. A fresh named volume is created **root-owned**, but core-app runs as uid 10001
  # (services/core-app/Dockerfile) and is the *writer* — it writes /etc/epicurus/ollama.env to
  # apply the operator's KV-cache choice (#307). Without this, that write hits a root-owned
  # volume and fails with PermissionError; the ollama container mounts the same volume :ro and
  # so cannot chown it either (#392). The env file sits directly at the volume root, so we chown
  # the root — no subdirs needed. Mirrors qdrant-init, the core image entrypoint, and the OpenBao chown.
  ollama-init:
    image: alpine:3.21
    restart: "no"
    user: root
    volumes:
      - ollama-runtime:/data
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mkdir -p /data
        chown 10001:10001 /data
        chmod 755 /data
        echo "ollama-init: ensured ollama-runtime volume root owned by uid 10001"
    logging: *default-logging
    networks: [epicurus]

  ollama:
    image: ollama/ollama:0.30.7
    restart: unless-stopped
    # Wait for the chown one-shot so the volume the core later writes to is owned by uid 10001
    # (#392). This is ordering only — nothing here races the core's write, which is lazy: it
    # happens on an operator KV-cache change, long after boot, never at startup. (Gating ollama
    # rather than core-app mirrors qdrant→qdrant-init and keeps the fix in this one fragment.)
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    # Source the core-managed env file (KV-cache type, #307) on every (re)start, then run the
    # server. This is what lets a plain `docker restart` actually apply the choice — env is
    # otherwise fixed at container create. The file (in the shared volume below) is absent until
    # the operator picks a non-default type; until then the `environment:` defaults apply.
    entrypoint:
      - /bin/sh
      - -c
      - 'set -a; [ -f /etc/epicurus/ollama.env ] && . /etc/epicurus/ollama.env; set +a; exec /bin/ollama serve'
    environment:
      # Unload a model this long after its last use to free memory / VRAM at idle
      # (ADR-0005). The core also sets keep_alive per request.
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      # KV-cache quantization defaults — trade a little quality for much less VRAM at long
      # contexts (ADR-0046). Read at startup; these are the baseline, overridden by the
      # core-managed env file when the operator picks a type on the Models page (#307, which
      # writes the file + restarts this container to apply). q8_0 / q4_0 need flash attention.
      OLLAMA_FLASH_ATTENTION: ${OLLAMA_FLASH_ATTENTION:-0}
      OLLAMA_KV_CACHE_TYPE: ${OLLAMA_KV_CACHE_TYPE:-f16}
    volumes:
      - ollama-models:/root/.ollama
      # Read-only here; the core (RW) writes ollama.env to apply the KV-cache choice (#307).
      - ollama-runtime:/etc/epicurus:ro
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks: [epicurus]

volumes:
  ollama-models:
  # Shared with core-app (which mounts it read-write): the core-managed Ollama start-up env
  # file (KV-cache type) the entrypoint sources, so the choice survives reconciles (#307).
  ollama-runtime:
