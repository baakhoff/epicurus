site_name: epicurus
site_description: Self-hosted, modular, local-first personal-assistant platform
repo_url: https://github.com/baakhoff/epicurus
repo_name: baakhoff/epicurus
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - User Guide:
      - user/index.md
      - Installation: user/installation.md
      - Configuration: user/configuration.md
  - Developer Guide:
      - developer/index.md
      - Architecture: developer/architecture.md
      - Development setup: developer/development-setup.md
      - Building a module: developer/building-a-module.md
      - Testing: developer/testing.md
      - Contributing: developer/contributing.md
      - Releases: developer/releases.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/baakhoff/epicurus
