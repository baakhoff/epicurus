# Core App module — a per-module compose fragment (ADR-0006).
# Add it to the top-level compose.yaml `include:` list to run it in the stack.
services:
  core-app:
    build:
      context: ../..
      dockerfile: services/core-app/Dockerfile
    image: ghcr.io/baakhoff/epicurus-core-app:${EPICURUS_VERSION:-latest}
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      OLLAMA_URL: http://ollama:11434
      # ── LLM gateway tuning (all optional; blank/unset = provider default) ──
      # Set any of these and restart — no code edit needed (issue #114).
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-llama3.2}
      LLM_KEEP_ALIVE: ${LLM_KEEP_ALIVE:-5m}
      LLM_FALLBACKS: ${LLM_FALLBACKS:-}
      LLM_NUM_RETRIES: ${LLM_NUM_RETRIES:-2}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-}
      LLM_TOP_P: ${LLM_TOP_P:-}
      LLM_NUM_CTX: ${LLM_NUM_CTX:-}
      OPENBAO_URL: http://openbao:8200
      OPENBAO_TOKEN: ${OPENBAO_TOKEN}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-local}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-epicurus}:${POSTGRES_PASSWORD:-epicurus-dev}@postgres:5432/${POSTGRES_DB:-epicurus}
      QDRANT_URL: http://qdrant:6333
      MEMORY_EMBED_MODEL: ${MEMORY_EMBED_MODEL:-nomic-embed-text}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-http://localhost:8084}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:-change-this-before-use}
      # Scopes confirmed module removal (#127) to this stack's containers only, so a
      # co-located stack (e.g. the CI smoke run beside a dev stack) is never touched.
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-epicurus}
    # Confirmed module removal (#127, ADR-0028): the core stops/removes a *module's own*
    # container through the Docker socket. Read-write socket access is privileged — the
    # DockerController is the only code path that uses it, and it refuses anything but a
    # known module's container (never core-app / web / a data-plane service). Remove this
    # mount to disable removal entirely (the endpoint then returns 503).
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # KV-cache apply (#307): the core writes ollama.env here; Ollama mounts it read-only and
      # sources it on (re)start. A named volume, so the choice persists across reconciles.
      - ollama-runtime:/etc/epicurus
      # The shared file space (ADR-0063): the core now owns it — mounts the volume read-write at
      # FILES_ROOT (/data), provisions the tenant root, indexes the tree, and serves the Files UI.
      # Default an empty named volume; set EPICURUS_FILES_ROOT to a host dir to expose real files.
      - ${EPICURUS_FILES_ROOT:-epicurus-files}:/data
    # Loopback-bound by default; the gateway is the intended front door. Set
    # BIND_ADDRESS to expose directly (the module<->core contract stays local).
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${CORE_PORT:-8082}:8080"
    depends_on:
      nats:
        condition: service_started
      ollama:
        condition: service_started
      openbao:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      # Routed by the edge gateway (ADR-0008). No effect if no gateway is running.
      - traefik.enable=true
      - traefik.http.routers.core-app.rule=Host(`core-app.localhost`)
      - traefik.http.routers.core-app.entrypoints=web
      - traefik.http.services.core-app.loadbalancer.server.port=8080
      # Scraped by Prometheus via Docker service discovery.
      - epicurus.metrics.port=8080
    networks: [epicurus]
