# Echo module — a per-module compose fragment (ADR-0006), assembled into the
# top-level stack via the root compose.yaml `include`.
services:
  echo:
    build:
      context: ../..
      dockerfile: services/echo/Dockerfile
    image: ghcr.io/baakhoff/epicurus-echo:${EPICURUS_VERSION:-latest}
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: module
      NATS_PASSWORD: ${NATS_MODULE_PASSWORD:-epicurus-dev}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # OpenTelemetry tracing (#57). Off by default; set OTEL_TRACES_ENABLED=true with
      # the `observability` profile up to emit spans to Tempo over OTLP/HTTP.
      OTEL_TRACES_ENABLED: ${OTEL_TRACES_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
    # Loopback-bound by default; the gateway is the intended front door. Set
    # BIND_ADDRESS to expose directly (the module<->core contract stays local).
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${ECHO_PORT:-8080}:8080"
    depends_on:
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      # Routed by the edge gateway (ADR-0008). No effect if no gateway is running.
      - traefik.enable=true
      - traefik.http.routers.echo.rule=Host(`echo.localhost`)
      - traefik.http.routers.echo.entrypoints=web
      - traefik.http.services.echo.loadbalancer.server.port=8080
      # Scraped by Prometheus via Docker service discovery.
      - epicurus.metrics.port=8080
    # Bounded json-file logging (#462) — unbounded default otherwise fills the disk.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [epicurus]
