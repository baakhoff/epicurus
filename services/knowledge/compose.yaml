# Knowledge module — per-module compose fragment (ADR-0006).
# Add to the top-level compose.yaml `include:` list to enable this module.
services:
  knowledge:
    build:
      context: ../..
      dockerfile: services/knowledge/Dockerfile
    image: ghcr.io/baakhoff/epicurus-knowledge:${EPICURUS_VERSION:-latest}
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: module
      NATS_PASSWORD: ${NATS_MODULE_PASSWORD:-epicurus-dev}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-epicurus}:${POSTGRES_PASSWORD:-epicurus-dev}@postgres:5432/${POSTGRES_DB:-epicurus}
      QDRANT_URL: http://qdrant:6333
      # Base URL of the core service on the internal Docker network (service name
      # is `core-app`, not `core`).
      PLATFORM_URL: http://core-app:8080
      # Knowledge's home inside the shared file space (#KB-refactor): the on-disk tree is
      # tenant-scoped (constraint #1) to <files-root>/<tenant>/knowledge — VAULT_PATH is the
      # base path; the service inserts the DEFAULT_TENANT_ID segment. Each top-level folder
      # under it is a "project" (knowledge base). Storage indexes the same tree read-only.
      VAULT_PATH: ${VAULT_PATH:-/data/knowledge}
      # Live vault sync (#232): watch a bind-mounted vault and re-index on change, so edits
      # Obsidian Sync lands on disk show up in search without a manual re-index. Off by
      # default. Enabling it makes the vault **externally owned** — the Knowledge editor page
      # goes read-only and Obsidian becomes the sole author (ADR-0035) — and it reads the vault
      # from a disk mount (the inotify watcher has no file-API analogue). So watch mode also
      # needs a compose override that mounts the vault back into this container; see
      # docs/developer/obsidian-sync.md for the same-host and headless (Git) recipes.
      VAULT_WATCH: ${VAULT_WATCH:-false}
      VAULT_WATCH_DEBOUNCE_MS: ${VAULT_WATCH_DEBOUNCE_MS:-1500}
    # No /data mount (#346, ADR-0064): knowledge reads AND writes the vault through the
    # core-owned file API (PlatformClient.files_*), so the read path follows the swappable
    # local-FS ↔ S3 backend (constraint #3) and the module holds no shared-volume mount — the
    # core is the sole mounter of /data (storage went the same way in ADR-0063). Watch mode is
    # the one exception and re-adds a read-only mount via an override (obsidian-sync.md).
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${KNOWLEDGE_PORT:-8085}:8080"
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.knowledge.rule=Host(`knowledge.localhost`)
      - traefik.http.routers.knowledge.entrypoints=web
      - traefik.http.services.knowledge.loadbalancer.server.port=8080
      - epicurus.metrics.port=8080
    networks: [epicurus]

# The shared `epicurus-files` volume is declared in the data plane
# (infra/compose/docker-compose.yml) and mounted only by the core now — knowledge and storage
# both reach the file space through the core file API. Watch mode's override remounts it here.
