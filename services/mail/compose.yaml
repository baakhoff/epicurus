# Mail module — per-module compose fragment (ADR-0006).
# Add to the top-level compose.yaml `include:` list to enable this module.
services:
  mail:
    build:
      context: ../..
      dockerfile: services/mail/Dockerfile
    image: ghcr.io/baakhoff/epicurus-mail:${EPICURUS_VERSION:-latest}
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: module
      NATS_PASSWORD: ${NATS_MODULE_PASSWORD:-epicurus-dev}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PLATFORM_URL: http://core-app:8080
      # Tenant-scoped local mail cache (ADR-0096, #623): the module owns its own tables in the
      # shared Postgres — no shared database, just a shared server (constraint #2).
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-epicurus}:${POSTGRES_PASSWORD:-epicurus-dev}@postgres:5432/${POSTGRES_DB:-epicurus}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${MAIL_PORT:-8090}:8080"
    depends_on:
      core-app:
        condition: service_healthy
      nats:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.mail.rule=Host(`mail.localhost`)
      - traefik.http.routers.mail.entrypoints=web
      - traefik.http.services.mail.loadbalancer.server.port=8080
      - epicurus.metrics.port=8080
    # Bounded json-file logging (#462) — unbounded default otherwise fills the disk.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [epicurus]
