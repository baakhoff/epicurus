[project]
name = "epicurus-storage"
version = "0.1.0"
description = "Storage module — read-only file-tree index with browse, search, and download."
requires-python = ">=3.11"
dependencies = [
    "epicurus-core",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/epicurus_storage"]

[tool.uv.sources]
epicurus-core = { workspace = true }
