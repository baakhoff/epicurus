# Websearch module — per-module compose fragment (ADR-0006).
# Add to the top-level compose.yaml `include:` list to enable this module.
services:
  websearch:
    build:
      context: ../..
      dockerfile: services/websearch/Dockerfile
    image: ghcr.io/baakhoff/epicurus-websearch:${EPICURUS_VERSION:-latest}
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SEARXNG_URL: http://searxng:8080
      PLATFORM_URL: http://core-app:8080
      # Maximum results returned by the web_search tool (operator can override).
      WEBSEARCH_MAX_RESULTS: ${WEBSEARCH_MAX_RESULTS:-5}
      # Comma-separated SearXNG engine names (empty = SearXNG defaults).
      WEBSEARCH_ENGINES: ${WEBSEARCH_ENGINES:-}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${WEBSEARCH_PORT:-8086}:8080"
    depends_on:
      nats:
        condition: service_started
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.websearch.rule=Host(`websearch.localhost`)
      - traefik.http.routers.websearch.entrypoints=web
      - traefik.http.services.websearch.loadbalancer.server.port=8080
      - epicurus.metrics.port=8080
    networks: [epicurus]
