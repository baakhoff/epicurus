# {{ cookiecutter.service_name }} module — a per-module compose fragment (ADR-0006).
# Wiring it into the stack is a short checklist (root compose `include:` + the core's
# `module_urls` + a unique port) — see this module's README. The CI runtime-smoke
# gate boots the stack and fails if the module isn't discoverable, so don't skip it.
services:
  {{ cookiecutter.service_slug }}:
    build:
      context: ../..
      dockerfile: services/{{ cookiecutter.service_slug }}/Dockerfile
    image: {{ cookiecutter.image }}:latest
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Uncomment if this module calls back into the core for LLM / embeddings via
      # epicurus_core's PlatformClient (modules never hold model keys — ADR-0010):
      # PLATFORM_URL: http://core-app:8080
    # Loopback-bound by default; the gateway is the intended front door. Set
    # BIND_ADDRESS to expose directly (the module<->core contract stays local).
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:{{ cookiecutter.port }}:8080"
    depends_on:
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      # Routed by the edge gateway (ADR-0008). No effect if no gateway is running.
      - traefik.enable=true
      - traefik.http.routers.{{ cookiecutter.service_slug }}.rule=Host(`{{ cookiecutter.service_slug }}.localhost`)
      - traefik.http.routers.{{ cookiecutter.service_slug }}.entrypoints=web
      - traefik.http.services.{{ cookiecutter.service_slug }}.loadbalancer.server.port=8080
      # Scraped by Prometheus via Docker service discovery.
      - epicurus.metrics.port=8080
    networks: [epicurus]
